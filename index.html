<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <div class="py-5 container">
        <h2>Task Manager</h2>

        <form action="" method="post" id="task-form">
            <label for="task-title">Task:</label>
            <input id="task-title" type="text" class="form-control mb-4">
            <label for="priority">Priority:</label>
            <select name="priority" id="task-priority" class="form-control mb-4">
                <option value="Low">Low</option>
                <option value="Middle">Middle</option>
                <option value="High">High</option>
            </select>
            <button type="submit" class="btn btn-primary mt-4">Save</button>
        </form>


    </div>

    <div class="container">
        <h2>Tasks</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Priority</th>
                    <th>Is Completed</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tasks_list"></tbody>
        </table>
    </div>
    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTaskModalLabel">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="edit-task-form">
                    <div class="modal-body">
                        <input type="hidden" id="edit-task-id">
                        <div class="mb-3">
                            <label for="edit-task-title" class="form-label">Task</label>
                            <input id="edit-task-title" type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-task-priority" class="form-label">Priority</label>
                            <select id="edit-task-priority" class="form-control">
                                <option value="Low">Low</option>
                                <option value="Middle">Middle</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="edit-task-completed">
                            <label class="form-check-label" for="edit-task-completed">
                                Completed
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>

    
</body>
</html>
